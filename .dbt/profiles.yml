crypto_pipeline:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "ODBC Driver 18 for SQL Server"
      server: "localhost"
      port: 1433
      database: "crypto_data"
      schema: "silver"
      user: "sa"
      password: "{{ env_var('MSSQL_SA_PASSWORD') }}"
      encrypt: true
      trust_cert: true
      threads: 4