crypto_pipeline:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "{{ env_var('MSSQL_DRIVER', 'ODBC Driver 18 for SQL Server') }}"
      server: "{{ env_var('MSSQL_SERVER', 'localhost') }}"
      port: 1433
      database: "{{ env_var('MSSQL_DATABASE', 'crypto_data') }}"
      schema: "silver"
      user: "{{ env_var('MSSQL_USER', 'sa') }}"
      password: "{{ env_var('MSSQL_SA_PASSWORD') }}"
      encrypt: true
      trust_cert: true
      threads: 4
