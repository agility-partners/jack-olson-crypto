services:
  cryptoapi:
    build:
      context: ./CryptoApi
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__CryptoDb=Server=sqlserver,1433;Database=crypto_data;User ID=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - .:/app
      - frontend_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - API_URL=http://cryptoapi:8080
      - WATCHPACK_POLLING=true
      - GOOGLE_GENERATIVE_AI_API_KEY
    depends_on:
      - cryptoapi

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD must be set in .env or environment}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./scripts/init-db.sql:/init-db.sql
      - ./scripts/init-db.sh:/init-db.sh
    entrypoint: ["/bin/bash", "/init-db.sh"]
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ingester:
    build:
      context: .
      dockerfile: Dockerfile.ingester
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD must be set in .env or environment}
      - INGEST_INTERVAL_SECONDS=${INGEST_INTERVAL_SECONDS:-300}
      - COINGECKO_PER_PAGE=100
      - COINGECKO_COIN_IDS=bitcoin,ethereum,binancecoin,solana,ripple,cardano,avalanche-2,polkadot,dogecoin,litecoin,uniswap,chainlink,sui,monero,cosmos,vechain,theta-token,the-graph,hedera-hashgraph,algorand,elrond-erd-2,filecoin,internet-computer,tezos,near,aave,stellar,optimism,bitcoin-cash,injective-protocol,arbitrum,aptos,tether,usd-coin,tron,the-open-network,kaspa,render-token,sei-network,pepe,shiba-inu,ethereum-classic,celestia,lido-dao,bonk,mantle,crypto-com-chain,worldcoin-wld,bittensor,floki,jupiter-exchange-solana,blockstack,immutable-x,axie-infinity,chiliz,pyth-network,ondo-finance,dydx,wormhole,blur,thorchain,curve-dao-token,fetch-ai,decentraland,the-sandbox,flow,zcash,dash,gala,enjincoin,ethereum-name-service,compound-governance-token,ethena,arweave,helium,celo,neo,osmosis,iota,kava,gmx,pendle,notcoin,jasmycoin,quant-network,mina-protocol,eigenlayer,conflux-token,akash-network,ronin,golem,reserve-rights-token,zilliqa,qtum,1inch,ankr,yearn-finance,loopring,oasis-network,nexo
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  frontend_modules:
  sqlserver_data:
