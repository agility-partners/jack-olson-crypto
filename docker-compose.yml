services:
  cryptoapi:
    build:
      context: ./CryptoApi
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__CryptoDb=Server=sqlserver,1433;Database=crypto_data;User ID=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - .:/app
      - frontend_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - API_URL=http://cryptoapi:8080
      - WATCHPACK_POLLING=true
    depends_on:
      - cryptoapi

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD must be set in .env or environment}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./scripts/init-db.sql:/init-db.sql
      - ./scripts/init-db.sh:/init-db.sh
    entrypoint: ["/bin/bash", "/init-db.sh"]
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  frontend_modules:
  sqlserver_data:
